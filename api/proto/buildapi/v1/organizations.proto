syntax = "proto3";

package buildapi.v1;

import "google/api/annotations.proto";

option go_package = "github.com/builderhub/build-api/api/gen/buildapi/v1;buildapiv1";

// OrganizationService manages organizations and membership.
service OrganizationService {
  // ListOrganizations returns organizations the current user is a member of.
  rpc ListOrganizations(ListOrganizationsRequest) returns (ListOrganizationsResponse) {
    option (google.api.http) = { get: "/v1/organizations" };
  }

  // GetOrganization returns a single organization by id.
  rpc GetOrganization(GetOrganizationRequest) returns (GetOrganizationResponse) {
    option (google.api.http) = { get: "/v1/organizations/{id}" };
  }

  // CreateOrganization creates a new organization; caller becomes owner.
  rpc CreateOrganization(CreateOrganizationRequest) returns (CreateOrganizationResponse) {
    option (google.api.http) = {
      post: "/v1/organizations"
      body: "*"
    };
  }

  // UpdateOrganization updates organization name, slug, or plan.
  rpc UpdateOrganization(UpdateOrganizationRequest) returns (UpdateOrganizationResponse) {
    option (google.api.http) = {
      patch: "/v1/organizations/{id}"
      body: "*"
    };
  }

  // DeleteOrganization removes the organization, its members, and the Kubernetes namespace (all builders).
  rpc DeleteOrganization(DeleteOrganizationRequest) returns (DeleteOrganizationResponse) {
    option (google.api.http) = { delete: "/v1/organizations/{id}" };
  }

  // ListOrganizationMembers returns members of an organization (caller must be a member).
  rpc ListOrganizationMembers(ListOrganizationMembersRequest) returns (ListOrganizationMembersResponse) {
    option (google.api.http) = { get: "/v1/organizations/{organization_id}/members" };
  }
}

message ListOrganizationsRequest {}

message ListOrganizationsResponse {
  repeated Organization organizations = 1;
}

message GetOrganizationRequest {
  string id = 1;
}

message GetOrganizationResponse {
  Organization organization = 1;
}

message CreateOrganizationRequest {
  string name = 1;
  string slug = 2;
  string plan = 3; // starter, pro, enterprise
}

message CreateOrganizationResponse {
  Organization organization = 1;
}

message UpdateOrganizationRequest {
  string id = 1;
  string name = 2;   // empty = no change
  string slug = 3;  // empty = no change
  string plan = 4;  // empty = no change
}

message UpdateOrganizationResponse {
  Organization organization = 1;
}

message DeleteOrganizationRequest {
  string id = 1;
}

message DeleteOrganizationResponse {}

message Organization {
  string id = 1;
  string name = 2;
  string slug = 3;
  string plan = 4;
  int64 created_at = 5;
  int32 builder_count = 6;
  int64 total_minutes = 7;
  int64 monthly_minutes = 8;
  int32 member_count = 9;
}

message ListOrganizationMembersRequest {
  string organization_id = 1;
}

message ListOrganizationMembersResponse {
  repeated OrganizationMember members = 1;
}

message OrganizationMember {
  string user_id = 1;
  string email = 2;
  string name = 3;
  string role = 4;
  int64 joined_at = 5;
}
