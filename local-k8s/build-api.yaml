# build-api deployment for local dev - runs in cluster alongside Postgres
# Used by Tilt when full stack runs in Kind
apiVersion: apps/v1
kind: Deployment
metadata:
  name: build-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: build-api
  template:
    metadata:
      labels:
        app: build-api
    spec:
      containers:
        - name: build-api
          image: build-api
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              value: "postgres://builderhub:builderhub123@postgres:5432/builderhub?sslmode=disable"
            - name: JWT_SECRET
              value: "dev-secret-change-in-production"
            - name: HTTP_ADDR
              value: ":8090"
            - name: GRPC_ADDR
              value: ":9090"
          ports:
            - name: http
              containerPort: 8090
            - name: grpc
              containerPort: 9090
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: build-api
spec:
  selector:
    app: build-api
  ports:
    - name: http
      port: 8090
      targetPort: 8090
    - name: grpc
      port: 9090
      targetPort: 9090
